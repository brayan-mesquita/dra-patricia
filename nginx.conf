server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve pastas com ponto no nome (ex: 1.1-perfil, 3.2-vendas)
    # try_files: tenta arquivo → diretório → arquivo.html → 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Página 404 customizada do Quartz
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Bloqueia indexação nos motores de busca (reforço além do robots.txt)
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache para assets estáticos (CSS, JS, fontes)
    location ~* \.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Sem cache para HTML (sempre serve versão atualizada)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
